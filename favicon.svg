<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#060606"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect width="504" height="504" x="4" y="4" rx="105" ry="105" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.25"/>

  <!-- X — clean, no glow -->
  <line x1="130" y1="108" x2="370" y2="348" stroke="url(#xGrad)" stroke-width="68" stroke-linecap="round"/>
  <line x1="370" y1="108" x2="130" y2="348" stroke="url(#xGrad)" stroke-width="68" stroke-linecap="round"/>

  <!-- Lock — top right, clean -->
  <g transform="translate(356, 32)">
    <rect x="0" y="44" width="72" height="58" rx="11" ry="11" fill="#FF6B00" opacity="0.9"/>
    <path d="M13 44 L13 26 Q13 4 36 4 Q59 4 59 26 L59 44" fill="none" stroke="#FF6B00" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
    <circle cx="36" cy="70" r="8" fill="#1a1a1a"/>
    <rect x="32" y="70" width="8" height="13" rx="3" fill="#1a1a1a"/>
  </g>

  <!-- Separator line -->
  <rect x="40" y="378" width="432" height="1.5" rx="1" fill="#FF6B00" opacity="0.2"/>

  <!-- X-Encoder text — clean, no glow -->
  <text x="52" y="460" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" fill="#FF6B00" letter-spacing="-2">X-</text>
  <text x="178" y="460" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" fill="#ffffff" opacity="0.92" letter-spacing="-2">Encoder</text>

</svg>
