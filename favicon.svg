<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#060606"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
    <linearGradient id="stripGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Everything clipped to rounded rect -->
  <g clip-path="url(#roundClip)">

    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- X -->
    <line x1="112" y1="96" x2="400" y2="368" stroke="url(#xGrad)" stroke-width="74" stroke-linecap="round"/>
    <line x1="400" y1="96" x2="112" y2="368" stroke="url(#xGrad)" stroke-width="74" stroke-linecap="round"/>

    <!-- Text strip background -->
    <rect x="0" y="382" width="512" height="130" fill="url(#stripGrad)"/>

    <!-- Top border of text strip -->
    <rect x="0" y="382" width="512" height="3" fill="#FF6B00" opacity="0.7"/>

    <!-- X-Encoder text centered -->
    <text x="256" y="466"
      font-family="'Arial Black', Arial, sans-serif"
      font-size="80"
      font-weight="900"
      text-anchor="middle"
      letter-spacing="-1">
      <tspan fill="#FF6B00">X-</tspan><tspan fill="#ffffff">Encoder</tspan>
    </text>

  </g>

  <!-- Outer border on top -->
  <rect width="510" height="510" x="1" y="1" rx="107" ry="107" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.3"/>

</svg>
