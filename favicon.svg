<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF9500" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="xGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow border -->
  <rect width="62" height="62" x="1" y="1" rx="13" ry="13" fill="none" stroke="#FF6B00" stroke-width="1" opacity="0.35"/>

  <!-- Orange ambient glow behind X -->
  <ellipse cx="32" cy="32" rx="14" ry="14" fill="#FF6B00" opacity="0.08" filter="url(#softGlow)"/>

  <!-- X shape with glow -->
  <g filter="url(#xGlow)">
    <line x1="17" y1="16" x2="47" y2="46" stroke="url(#xGrad)" stroke-width="8.5" stroke-linecap="round"/>
    <line x1="47" y1="16" x2="17" y2="46" stroke="url(#xGrad)" stroke-width="8.5" stroke-linecap="round"/>
  </g>

  <!-- Code brackets < > bottom corners to hint "encoder/tool" -->
  <text x="5" y="61" font-family="monospace" font-size="9" font-weight="bold" fill="#FF6B00" opacity="0.55">&lt;/&gt;</text>

  <!-- Small lock icon top-right to hint "encoder/protect" -->
  <rect x="47" y="6" width="11" height="8" rx="2" fill="none" stroke="#FF6B00" stroke-width="1.2" opacity="0.6"/>
  <path d="M50 6 Q50 2 57 2 Q57 6 57 6" fill="none" stroke="#FF6B00" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
  <circle cx="52.5" cy="10" r="1.2" fill="#FF6B00" opacity="0.7"/>
</svg>
