<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <filter id="xGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lockGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle orange inner border -->
  <rect width="506" height="506" x="3" y="3" rx="110" ry="110" fill="none" stroke="#FF6B00" stroke-width="3" opacity="0.3"/>

  <!-- Ambient glow center -->
  <ellipse cx="256" cy="256" rx="160" ry="160" fill="url(#glowBg)"/>

  <!-- X shape — thick, glowing, centered -->
  <g filter="url(#xGlow)">
    <line x1="128" y1="124" x2="384" y2="388" stroke="url(#xGrad)" stroke-width="68" stroke-linecap="round"/>
    <line x1="384" y1="124" x2="128" y2="388" stroke="url(#xGrad)" stroke-width="68" stroke-linecap="round"/>
  </g>

  <!-- Lock body — top right -->
  <g filter="url(#lockGlow)">
    <rect x="374" y="46" width="88" height="66" rx="14" fill="none" stroke="#FF6B00" stroke-width="9" opacity="0.75"/>
    <path d="M394 46 Q394 14 418 14 Q462 14 462 46" fill="none" stroke="#FF6B00" stroke-width="9" opacity="0.75" stroke-linecap="round"/>
    <circle cx="418" cy="79" r="10" fill="#FF6B00" opacity="0.8"/>
    <line x1="418" y1="79" x2="418" y2="96" stroke="#FF6B00" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- </> brackets — bottom left -->
  <text x="38" y="488" font-family="monospace" font-size="72" font-weight="900" fill="#FF6B00" opacity="0.5">&lt;/&gt;</text>

</svg>
